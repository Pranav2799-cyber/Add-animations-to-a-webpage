<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>FoodHub Restaurant</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">

<a class="navbar-brand" href="#">FoodHub</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">

<ul class="navbar-nav ms-auto">

<li class="nav-item"><a class="nav-link" href="#">Home</a></li>
<li class="nav-item"><a class="nav-link" href="#menu-section">Menu</a></li>
<li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>

</ul>

</div>
</div>
</nav>

<!-- HERO SECTION -->

<section class="hero">

<h1 class="typing">Welcome to FoodHub Restaurant</h1>

</section>

<!-- FOOD SLIDER -->

<div id="foodSlider" class="carousel slide" data-bs-ride="carousel">

<div class="carousel-inner">

<div class="carousel-item active">
<img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092" class="d-block w-100">
</div>

<div class="carousel-item">
<img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836" class="d-block w-100">
</div>

<div class="carousel-item">
<img src="https://images.unsplash.com/photo-1550547660-d9450f859349" class="d-block w-100">
</div>

</div>

</div>

<!-- MENU SECTION -->

<div class="container my-5" id="menu-section">

<h2 class="text-center mb-4 reveal">Our Menu</h2>

<div class="text-center mb-4">

<button class="btn btn-dark filter-btn" data-category="all">All</button>
<button class="btn btn-dark filter-btn" data-category="burger">Burger</button>
<button class="btn btn-dark filter-btn" data-category="pizza">Pizza</button>
<button class="btn btn-dark filter-btn" data-category="salad">Salad</button>

</div>

<div class="row g-4">

<div class="col-md-4 menu-item burger reveal">
<div class="card">
<img src="https://images.unsplash.com/photo-1550547660-d9450f859349" class="card-img-top">
<div class="card-body">
<h5>Cheese Burger</h5>
<p>Tasty grilled burger</p>
</div>
</div>
</div>

<div class="col-md-4 menu-item pizza reveal">
<div class="card">
<img src="https://images.unsplash.com/photo-1594007654729-407eedc4be65" class="card-img-top">
<div class="card-body">
<h5>Italian Pizza</h5>
<p>Delicious cheesy pizza</p>
</div>
</div>
</div>

<div class="col-md-4 menu-item salad reveal">
<div class="card">
<img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c" class="card-img-top">
<div class="card-body">
<h5>Healthy Salad</h5>
<p>Fresh organic vegetables</p>
</div>
</div>
</div>

</div>

</div>

<!-- CONTACT -->

<div class="container my-5 reveal" id="contact">

<h2 class="text-center">Contact Us</h2>

<form class="row g-3">

<div class="col-md-6">
<input type="text" class="form-control" placeholder="Name">
</div>

<div class="col-md-6">
<input type="email" class="form-control" placeholder="Email">
</div>

<div class="col-12">
<textarea class="form-control" placeholder="Message"></textarea>
</div>

<div class="col-12 text-center">
<button class="btn btn-primary">Send Message</button>
</div>

</form>

</div>

<!-- WHATSAPP BUTTON -->

<a href="https://wa.me/919999999999" class="whatsapp-btn">💬</a>

<footer class="bg-dark text-white text-center p-3">

<p>© 2026 FoodHub Restaurant</p>

</footer>

<script src="script.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
